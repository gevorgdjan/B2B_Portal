[tool.ruff]
line-length = 100
target-version = "py312" # Укажи свою версию Python (3.11 или 3.12)
exclude = [".git", "venv", "migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"] # E,F - ошибки, I - сортировка импортов, UP - современные фичи
ignore = []

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]

[tool.django-stubs]
django_settings_module = "config.settings.local"